<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>opencoder · sessions</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2230;--txt:#e6edf3;--mut:#8b949e;--acc:#2f81f7;--ok:#3fb950;--err:#f85149;--pl:#bc8cff}
  *{box-sizing:border-box}body{margin:0;font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:var(--bg);color:var(--txt);display:grid;grid-template-columns:280px 1fr;height:100vh}
  #side{background:var(--panel);border-right:1px solid #30363d;overflow-y:auto;padding:10px}
  #side h1{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin:6px 4px 14px;display:flex;justify-content:space-between;align-items:center}
  #side button.new{background:var(--acc);color:#fff;border:0;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:11px}
  .sess{padding:8px 10px;border-radius:6px;cursor:pointer;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sess:hover{background:var(--panel2)}.sess.active{background:var(--panel2);box-shadow:inset 2px 0 var(--acc)}
  #main{display:flex;flex-direction:column;min-width:0}
  #top{padding:8px 14px;border-bottom:1px solid #30363d;display:flex;gap:10px;align-items:center;background:var(--panel)}
  #top .id{color:var(--mut);font-size:12px}
  #top .mode{background:var(--panel2);border:1px solid #30363d;border-radius:5px;padding:2px 8px;font-size:12px}
  #log{flex:1;overflow-y:auto;padding:16px}
  .m{margin:0 0 14px}.m .r{font-size:11px;color:var(--mut);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
  .m.user .r{color:var(--acc)}.m.assistant .r{color:var(--ok)}.m .b{white-space:pre-wrap;word-wrap:break-word}
  .tool{color:var(--pl);font-size:12px;border-left:2px solid var(--pl);padding-left:8px;margin:4px 0}.tool .o{color:var(--mut);white-space:pre-wrap}
  #composer{border-top:1px solid #30363d;padding:10px;display:flex;gap:8px;background:var(--panel)}
  textarea{flex:1;background:var(--panel2);color:var(--txt);border:1px solid #30363d;border-radius:8px;padding:10px;resize:none;font:inherit;min-height:48px;max-height:160px}
  button.send{background:var(--acc);color:#fff;border:0;border-radius:8px;padding:0 16px;cursor:pointer}
  button.send:disabled{opacity:.5;cursor:default}
  .badge{display:inline-block;margin-left:6px;font-size:10px;padding:1px 5px;border-radius:4px;background:#30363d;color:var(--mut)}
</style></head><body>
<aside id="side">
  <h1>sessions <button class="new" onclick="newSession()">+ new</button></h1>
  <div id="list"></div>
</aside>
<section id="main">
  <div id="top"><span class="id" id="curid">no session</span><span class="mode" id="mode">act</span></div>
  <div id="log"><p style="color:var(--mut)">Select or create a session.</p></div>
  <div id="composer">
    <textarea id="msg" placeholder="message the agent…  (Ctrl+Enter to send)"></textarea>
    <button class="send" id="send" onclick="send()">send</button>
  </div>
</section>
<script>
let cur=null, busy=false;
const $=s=>document.querySelector(s);
async function refresh(){const r=await fetch('/api/sessions');const xs=await r.json();
  $('#list').innerHTML='';xs.forEach(x=>{const d=document.createElement('div');d.className='sess'+(x.id===cur?' active':'');d.textContent=x.preview||x.id;d.onclick=()=>openSess(x.id);$('#list').appendChild(d);});}
async function newSession(){const r=await fetch('/api/sessions',{method:'POST'});const j=await r.json();cur=j.id;await refresh();openSess(cur);}
async function openSess(id){cur=id;$('#curid').textContent=id;await refresh();await load();}
async function load(){const r=await fetch('/api/sessions/'+cur);const j=await r.json();render(j.messages||[]);}
function render(msgs){const log=$('#log');log.innerHTML='';if(!msgs.length){log.innerHTML='<p style="color:var(--mut)">empty — send a message below.</p>';return;}
  msgs.forEach(m=>{const div=document.createElement('div');div.className='m '+m.role;
    const role=document.createElement('div');role.className='r';role.textContent=m.role+(m.synthetic?' · synthetic':'')+(m.agent?(' · '+m.agent):'');
    div.appendChild(role);(m.blocks||[]).forEach(b=>{const e=document.createElement('div');
      if(b.kind==='text'){e.className='b';e.textContent=b.text;}
      else if(b.kind==='tool_use'){e.className='tool';e.textContent='▸ '+b.name+'  '+JSON.stringify(b.input);}
      else if(b.kind==='tool_result'){e.className='tool';const o=document.createElement('div');o.className='o';o.textContent=(b.is_error?'[error] ':'')+b.content;e.appendChild(o);}
      else if(b.kind==='reasoning'){e.className='b';e.style.color='var(--mut)';e.textContent='… '+b.text;}
      else{return;}div.appendChild(e);});
    log.appendChild(div);});log.scrollTop=log.scrollHeight;}
async function send(){if(!cur){await newSession();}if(busy)return;const t=$('#msg').value.trim();if(!t)return;busy=true;$('#send').disabled=true;$('#msg').value='';
  const u=document.createElement('div');u.className='m user';u.innerHTML='<div class="r">user</div><div class="b"></div>';u.querySelector('.b').textContent=t;$('#log').appendChild(u);$('#log').scrollTop=$('#log').scrollHeight;
  try{const r=await fetch('/api/sessions/'+cur+'/prompt',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({prompt:t,agent:$('#mode').textContent})});
    const j=await r.json();await load();if(!j.ok&&j.error){alert(j.error);}}catch(e){alert(e);}finally{busy=false;$('#send').disabled=false;}}
$('#mode').onclick=()=>{$('#mode').textContent=$('#mode').textContent==='act'?'plan':'act';};
$('#msg').addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();send();}});
refresh();
</script></body></html>
